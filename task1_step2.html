<!DOCTYPE html>
<html>
<head>
    <title>Styled Webpage</title>

    <style>

        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: darkblue;
            font-size: 40px;
            margin-bottom: 20px;
        }

        h2 {
            color: darkgreen;
            margin-top: 30px;
        }

        p {
            color: #333333;
            font-size: 18px;
            line-height: 1.8;
            margin: 20px 0;
        }

        img {
            width: 300px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0px 4px 10px gray;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: darkblue;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
        }

        a:hover {
            background-color: navy;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Welcome to My Webpage</h1>

        <h2>About This Page</h2>

        <p>
            This webpage is designed using HTML and CSS.
            It includes headings, paragraphs, images,
            colors, spacing, and styled links.
        </p>

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRz0iL4pf1ENO6M9UyxQesHF8X-ewFlmbaEng&sadd .."
             alt="Sample Image">

        <br>

        <a href="https://www.google.com">
            Visit Google
        </a>

    </div>

</body>
</html>
